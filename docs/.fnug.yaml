fnug_version: 0.1.0
name: example
commands:
  - name: htop
    cmd: htop
  - name: recursive?!
    cmd: cargo run --bin fnug
    cwd: ..
  - name: A very very very long name
    cmd: cat ../src/pty/terminal.rs
  - name: always-fails
    cmd: exit 1
children:
  - name: nested-auto
    auto:
      always: true
    commands:
      - name: test-auto
        cmd: cat ../src/pty/terminal.rs
      - name: test-not-auto
        auto:
          always: false
        cmd: cat ../src/pty/terminal.rs
  - name: not-expanded
    auto:
      always: false
    commands:
      - name: test-not-expanded
        cmd: cat ../src/pty/terminal.rs
